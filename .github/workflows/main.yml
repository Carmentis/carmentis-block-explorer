#
name: Create and publish a general documentation docker image

# Configures this workflow to run every time a change is pushed to the branch called `release`.
on:
  push:
    branches: ['main']

# Defines two custom environment variables for the workflow. These are used for the Container registry domain, and a name for the Docker image that this workflow builds.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: explorer.themis.carmentis

# There is a single job in this workflow. It's configured to run on the latest available version of Ubuntu.
jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    # Sets the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write
      id-token: write
      # 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      # Uses the `docker/login-action` action to log in to the Container registry using the account and password that will publish the packages. Once published, the packages are scoped to the account defined here.
      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.REPOSITORY_PACKAGE_WRITE_TOKEN }}

      # This step uses the `docker/build-push-action` action to build the image, based on your repository's `Dockerfile`. If the build succeeds, it pushes the image to GitHub Packages.
      # It uses the `context` parameter to define the build's context as the set of files located in the specified path. For more information, see "[Usage](https://github.com/docker/build-push-action#usage)" in the README of the `docker/build-push-action` repository.
      # It uses the `tags` and `labels` parameters to tag and label the image with the output from the "meta" step.
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: .
          push: true
          tags: ghcr.io/carmentis/explorer.themis.carmentis:latest


      - name: Stop the running container if any
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ vars.TESTAPPS_HOST }}
          username: ${{ vars.TESTAPPS_USER }}
          port: ${{ vars.TESTAPPS_PORT }}
          key: ${{ secrets.TESTAPPS_SSH_PRIVATE_KEY }}
          script: "docker ps -q --filter 'name=carmentis-themis-explorer' | xargs --no-run-if-empty docker rm -f"

      - name: Download the latest image version
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ vars.TESTAPPS_HOST }}
          username: ${{ vars.TESTAPPS_USER }}
          port: ${{ vars.TESTAPPS_PORT }}
          key: ${{ secrets.TESTAPPS_SSH_PRIVATE_KEY }}
          script: "docker pull ghcr.io/carmentis/explorer.themis.carmentis:latest"


      - name: Run the latest version of the image
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ vars.TESTAPPS_HOST }}
          username: ${{ vars.TESTAPPS_USER }}
          port: ${{ vars.TESTAPPS_PORT }}
          key: ${{ secrets.TESTAPPS_SSH_PRIVATE_KEY }}
          script: "docker run --name carmentis-themis-explorer -d -p 6789:80 ghcr.io/carmentis/explorer.themis.carmentis:latest"
